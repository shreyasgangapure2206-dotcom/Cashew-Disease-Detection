version: '3.8'

services:
  cashew-ai:
    build: .
    container_name: cashew-disease-detection
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./static/uploads:/app/static/uploads
      - ./instance:/app/instance
      - ./dataset:/app/dataset
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-cashew-secret-key-2026}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - cashew-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - cashew-network
    # Pull llama3.2 model on startup
    command: >
      sh -c "ollama serve & sleep 5 && ollama pull llama3.2 && wait"

volumes:
  ollama_data:
    driver: local

networks:
  cashew-network:
    driver: bridge
