services:
  - type: web
    name: CashewDiseasePrediction
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///cashew_diagnostics.db
      - key: SECRET_KEY
        generateValue: true
      - key: OLLAMA_AVAILABLE
        value: "false"
